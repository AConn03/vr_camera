<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR Camera Display</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="video-container">
        <div class="video-wrapper" id="wrapper-left">
            <video id="video-left" class="video-feed" autoplay playsinline></video>
            <div class="canvas-container">
                <canvas id="canvas-left" class="effect-canvas"></canvas>
            </div>
        </div>
        <div class="video-wrapper" id="wrapper-right">
            <video id="video-right" class="video-feed" autoplay playsinline></video>
            <div class="canvas-container">
                <canvas id="canvas-right" class="effect-canvas"></canvas>
            </div>
        </div>
    </div>

    <video id="single-video" autoplay playsinline></video>
    <div class="canvas-container">
        <canvas id="canvas-single" class="effect-canvas"></canvas>
    </div>

    <div id="status">Click/Tap anywhere to start</div>

    <div id="controls-panel">
        <div class="controls-row">
            <button id="start-camera">Start Camera</button>
            <button id="stop-camera" disabled>Stop Camera</button>
            <button id="toggle-vr">Enable VR View</button>
            <button id="switch-camera">Switch Camera</button>
        </div>
        
        <div class="controls-row">
            <button id="offset-in">Move Apart</button>
            <button id="offset-out">Move Together</button>
            <button id="offset-reset">Reset Offset</button>
            <select id="effect-select">
                <option value="none">No Effect</option>
                <option value="edges">Edge Detection</option>
                <option value="longExposure">Long Exposure</option>
                <option value="motion">Motion Extraction</option>
            </select>
        </div>
        
        <div id="edge-controls" class="effect-controls ui-hidden-element">
            <div class="slider-container">
                <label for="edge-threshold">Edge Threshold: <span id="edge-threshold-value">5</span></label>
                <input type="range" id="edge-threshold" min="1" max="255" value="5" step="1">
            </div>
            
            <div class="slider-container">
                <label for="neighborhood-size">Line Thickness: <span id="neighborhood-size-value">1</span></label>
                <input type="range" id="neighborhood-size" min="1" max="3" value="1" step="1">
            </div>
            
            <div class="slider-container">
                <label for="band-median">Band Pass Center (0-100): <span id="band-median-value">15</span></label>
                <input type="range" id="band-median" min="0" max="100" value="15" step="1">
            </div>

            <div class="slider-container">
                <label for="band-range">Band Pass Width: <span id="band-range-value">10</span></label>
                <input type="range" id="band-range" min="1" max="100" value="10" step="1">
            </div>
        </div>
        
        <div id="long-exposure-controls" class="effect-controls ui-hidden-element">
            <div class="slider-container">
                <label for="blend-mode">Blend Mode:</label>
                <select id="blend-mode">
                    <option value="average">Blended (Average)</option>
                    <option value="lighten">Brightest (Light Trails)</option>
                    <option value="darken">Darkest</option>
                </select>
            </div>
            
            <div class="slider-container">
                <label for="blend-frames">Frames to Blend: <span id="blend-frames-value">15</span></label>
                <input type="range" id="blend-frames" min="2" max="60" value="15" step="1">
            </div>
        </div>

        <div id="motion-controls" class="effect-controls ui-hidden-element">
            <div class="slider-container">
                <label for="motion-delay">Motion Delay (Frames): <span id="motion-delay-value">10</span></label>
                <input type="range" id="motion-delay" min="1" max="60" value="10" step="1">
            </div>
        </div>
        
        <div class="info-row">
            <span id="offset-display">Offset: 0px</span>
            <span id="camera-display">Camera: Back</span>
            <span id="effect-display">Effect: None</span>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
